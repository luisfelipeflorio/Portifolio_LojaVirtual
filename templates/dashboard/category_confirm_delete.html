{% extends 'dashboard/base_dashboard.html' %}

{% block dashboard_content %}
<div class="max-w-3xl mx-auto">
    <h2 class="text-3xl font-bold font-['Playfair_Display'] text-neutral-900 mb-8">Confirmar Exclusão</h2>

    <div class="bg-white rounded-2xl shadow-md border border-neutral-100 p-8">
        <p class="text-lg text-neutral-700 mb-6">
            Tem certeza que deseja excluir a categoria <strong>"{{ object.name }}"</strong>?
        </p>
        <p class="text-sm text-red-600 mb-8">Esta ação não pode ser desfeita.</p>

        <form method="post">
            {% csrf_token %}
            <div class="flex justify-end space-x-4">
                <a href="{% url 'dashboard:category_list' %}"
                   class="px-6 py-3 border border-neutral-300 text-neutral-700 rounded-xl hover:bg-neutral-50 transition-all duration-200 cursor-pointer">
                    Cancelar
                </a>
                <button type="submit"
                        class="bg-red-600 hover:bg-red-700 text-white font-medium px-6 py-3 rounded-xl shadow-md hover:shadow-lg transition-all duration-200 cursor-pointer">
                    Confirmar Exclusão
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

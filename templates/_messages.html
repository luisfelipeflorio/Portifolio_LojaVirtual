{% if messages %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
    {% for message in messages %}
    <div class="mb-4 p-4 rounded-xl shadow-sm flex items-center justify-between {% if message.tags == 'success' %}bg-green-50 border border-green-200 text-green-800{% elif message.tags == 'error' %}bg-red-50 border border-red-200 text-red-800{% elif message.tags == 'warning' %}bg-yellow-50 border border-yellow-200 text-yellow-800{% else %}bg-blue-50 border border-blue-200 text-blue-800{% endif %}" role="alert">
        <p class="font-medium">{{ message }}</p>
        <button onclick="this.parentElement.remove()" class="ml-4 text-current hover:opacity-70 transition">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>
    {% endfor %}
</div>
{% endif %}

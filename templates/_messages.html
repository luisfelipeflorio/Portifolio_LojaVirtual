{% if messages %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
    {% for message in messages %}
    <div class="mb-4 p-4 rounded-md {% if message.tags == 'success' %}bg-green-100 border border-green-400 text-green-700{% elif message.tags == 'error' %}bg-red-100 border border-red-400 text-red-700{% elif message.tags == 'warning' %}bg-yellow-100 border border-yellow-400 text-yellow-700{% else %}bg-blue-100 border border-blue-400 text-blue-700{% endif %}" role="alert">
        <p>{{ message }}</p>
    </div>
    {% endfor %}
</div>
{% endif %}

{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div>
            <h1 class="font-['Playfair_Display'] text-3xl md:text-4xl font-bold text-neutral-900 text-center">
                Entrar
            </h1>
            <p class="mt-2 text-center text-sm text-neutral-600">
                Ou
                <a href="{% url 'accounts:register' %}" class="font-medium text-rose-600 hover:text-rose-500">
                    crie uma nova conta
                </a>
            </p>
        </div>
        <form class="mt-8 space-y-6" method="post">
            {% csrf_token %}
            {% include '_messages.html' %}
            
            {% for field in form %}
                <div>
                    <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-neutral-700 mb-1">
                        {{ field.label }}
                    </label>
                    {{ field }}
                    {% if field.errors %}
                        <span class="text-xs text-red-500 mt-1">{{ field.errors.0 }}</span>
                    {% endif %}
                </div>
            {% endfor %}
            
            <div>
                <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-rose-500 to-pink-600 hover:from-rose-600 hover:to-pink-700 text-white font-medium px-6 py-3 rounded-xl shadow-md hover:shadow-lg transition-all duration-200 cursor-pointer disabled:opacity-70 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                    <span id="btn-text">Entrar</span>
                    <svg id="btn-spinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </div>
            <script>
                document.querySelector('form').addEventListener('submit', function() {
                    const btn = document.getElementById('submit-btn');
                    const btnText = document.getElementById('btn-text');
                    const spinner = document.getElementById('btn-spinner');
                    btn.disabled = true;
                    btnText.textContent = 'Entrando...';
                    spinner.classList.remove('hidden');
                });
            </script>
        </form>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(to right, #be123c, #db2777); color: white; padding: 20px; border-radius: 8px 8px 0 0; }
        .content { background: #f9fafb; padding: 20px; border-radius: 0 0 8px 8px; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-weight: bold; }
        .status-received { background: #dbeafe; color: #1e40af; }
        .status-preparing { background: #fef3c7; color: #92400e; }
        .status-ready { background: #d1fae5; color: #065f46; }
        .status-delivered { background: #f3f4f6; color: #374151; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Atualização do Pedido {{ order.protocol }}</h1>
        </div>
        <div class="content">
            <p>Olá, {{ order.customer_name }}!</p>
            <p>Seu pedido <strong>{{ order.protocol }}</strong> teve uma atualização de status:</p>
            <p>
                <span class="status-badge status-{{ order.status }}">{{ status_display }}</span>
            </p>
            <p>Você pode acompanhar seu pedido acessando nosso site.</p>
            <p>Atenciosamente,<br>Confeitaria</p>
        </div>
    </div>
</body>
</html>
